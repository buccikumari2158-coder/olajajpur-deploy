  /drivers:
    get:
      operationId: listDrivers
      tags: [drivers]
      summary: List all drivers
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: search
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: approvalStatus
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Driver list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DriverListResponse"
    post:
      operationId: createDriver
      tags: [drivers]
      summary: Create driver manually
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DriverInput"
      responses:
        "201":
          description: Created driver
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Driver"

  /drivers/pending-approvals:
    get:
      operationId: getPendingDriverApprovals
